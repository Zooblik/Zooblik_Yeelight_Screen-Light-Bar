esphome:
  name: yeelight

esp8266:
  board: esp_wroom_02

external_components:
  - source:
      type: local
      path: lib
    components: [yeelight_remote]

wifi:
  ssid: "" # Введите Имя Вашей WiFi сети (в кавычках)
  password: "" # Введите пароль от WiFi (в кавычках)
  fast_connect: true

  # Ручные настройки сети для лампы (не используя DHCP) для применения стереть решетки #
  # manual_ip:
  #   static_ip: 192.168.1.161
  #   gateway: 192.168.1.1
  #   subnet: 255.255.255.0

captive_portal:

# Enable logging
logger:
  level: INFO

# Enable Home Assistant API
api:

ota:
  platform: esphome

wled:

# Specify the two pins of the h-bridge as PWM pins
output:
  - platform: esp8266_pwm
    pin: GPIO12
    id: output_cw
    power_supply: power
  - platform: esp8266_pwm
    pin: GPIO5
    id: output_ww
    power_supply: power

power_supply:
  - id: power
    pin: GPIO4
    enable_time: 0s
    keep_on_time: 0s

light:
  - platform: cwww
    id: light1
    default_transition_length: 0.1s
    constant_brightness: true
    gamma_correct: 2.8 # управляет нелинейной коррекцией яркости, чтобы восприятие света человеком выглядело «линейно»
    name: "Front"
    cold_white: output_cw
    warm_white: output_ww
    cold_white_color_temperature: 6500 K
    warm_white_color_temperature: 2700 K
  - platform: neopixelbus
    num_leds: 40
    pin: GPIO13
    name: "Back"
    variant: WS2812
    id: LED_ring
    power_supply: power
    # default_color: [127, 172, 255] # Начальный цвет белый (RGB)
    effects:
      - wled:
          port: 21324
      - addressable_rainbow:
      - random:
      - strobe:
      - flicker:
      - addressable_color_wipe:
    # Limit the brightness to prevent power supply from browning out.
    # color_correct: [90%, 90%, 90%]

uart:
  - id: remote_bus
    baud_rate: 4800
    rx_pin: GPIO2

yeelight_remote:
  # disable_parity_check: true # Отключаем проверку контрольной суммы
  on_press:
    - if:
        condition:
          lambda: "return id(light1).current_values.is_on();"
        then:
          - light.turn_off:
              id: light1
              transition_length: 1s
        else:
          - light.turn_on:
              id: light1
              transition_length: 1s
  on_left:
    then:
      - light.dim_relative:
          id: light1
          relative_brightness: -0.05
  on_right:
    then:
      - light.dim_relative:
          id: light1
          relative_brightness: 0.05
  on_long_press:
    - light.toggle: LED_ring

  # on_press_left: # Используем существующий триггер
  # on_press_right: # Используем существующий триггер

  on_press_left:
    - lambda: |-
        float current_temp = id(light1).current_values.get_color_temperature();
        if (current_temp == 0.0f) current_temp = 370.0f;  // mireds ~2700K
        float new_temp = current_temp + 20.0f;  // сдвиг в сторону «теплее»
        if (new_temp > 370.0f) new_temp = 370.0f;
        auto call = id(light1).make_call();
        call.set_color_temperature(new_temp);
        call.perform();
        ESP_LOGD("yeelight", "Temperature: %.0f K", 1000000.0f / new_temp);  // Кастомный лог

  on_press_right:
    - lambda: |-
        float current_temp = id(light1).current_values.get_color_temperature();
        if (current_temp == 0.0f) current_temp = 154.0f;  // mireds ~6500K
        float new_temp = current_temp - 20.0f;  // сдвиг в сторону «холоднее»
        if (new_temp < 154.0f) new_temp = 154.0f;
        auto call = id(light1).make_call();
        call.set_color_temperature(new_temp);
        call.perform();
        ESP_LOGD("yeelight", "Temperature: %.0f K", 1000000.0f / new_temp);  // Кастомный лог
